# ============================================================
# Nginx Configuration — AI MaaS Platform Load Balancer
# ============================================================
# Routes traffic across multiple FastAPI replicas using
# round-robin load balancing with health checks.
#
# Features:
# - Upstream pool with 3 API replicas
# - Request buffering for large model uploads
# - Proxy headers for client IP passthrough
# - Gzip compression for JSON responses
# - Connection timeouts tuned for inference workloads
# - Static rate limiting as an additional layer
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ── Logging Format ───────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time": "$time_iso8601",'
            '"remote_addr": "$remote_addr",'
            '"request": "$request",'
            '"status": $status,'
            '"body_bytes_sent": $body_bytes_sent,'
            '"upstream_addr": "$upstream_addr",'
            '"upstream_response_time": "$upstream_response_time",'
            '"request_time": $request_time,'
            '"http_user_agent": "$http_user_agent",'
            '"http_x_request_id": "$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css;

    # ── Client Body Size (for model uploads) ─────────────────
    client_max_body_size 500M;
    client_body_buffer_size 10M;

    # ── Rate Limiting Zone ───────────────────────────────────
    # Additional Nginx-level rate limiting (defense in depth)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=20r/s;

    # ── Upstream Pool ────────────────────────────────────────
    # Docker Compose DNS resolves 'api' to all 3 replicas
    upstream maas_api {
        least_conn;  # Route to the replica with fewest active connections

        # Docker Compose service name resolves to all replicas
        server api:8000 max_fails=3 fail_timeout=30s;

        keepalive 32;  # Connection pooling to upstream
    }

    # ── Server Block ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health Check (bypass rate limiting) ──────────────
        location /health {
            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ready {
            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /metrics {
            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Optional: restrict to internal networks
            # allow 10.0.0.0/8;
            # deny all;
        }

        # ── Prediction Endpoint (stricter rate limit) ────────
        location /api/v1/predict {
            limit_req zone=predict_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Inference can take longer
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Model Upload Endpoint ────────────────────────────
        location ~ /api/v1/models/.*/versions {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # Large file uploads need longer timeouts
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_request_buffering off;  # Stream uploads directly
        }

        # ── All Other API Routes ─────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://maas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Error Pages ──────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type application/json;
            return 503 '{"error_code":"SERVICE_UNAVAILABLE","message":"Service temporarily unavailable"}';
        }
    }
}
