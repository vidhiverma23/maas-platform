# ============================================================
# GitHub Actions CI/CD Pipeline — AI MaaS Platform
# ============================================================
# Triggers on push/PR to main. Runs:
# 1. Lint (ruff)
# 2. Type check (mypy)
# 3. Unit tests (pytest with coverage)
# 4. Docker build verification
# 5. Deploy to Azure (on main branch push only)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check app/ tests/ --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  # ── Unit Tests ───────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: maas_user
          POSTGRES_PASSWORD: maas_secret_password
          POSTGRES_DB: maas_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite  # For SQLite async tests

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://maas_user:maas_secret_password@localhost:5432/maas_db
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: development
          MODEL_STORAGE_PATH: ./test_model_storage
          CACHE_ENABLED: "false"
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Docker Build ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: maas-platform:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image health check
        run: |
          docker run -d --name test-container \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e APP_ENV=development \
            -p 8000:8000 \
            maas-platform:test || true
          sleep 5
          docker logs test-container || true
          docker stop test-container || true
          docker rm test-container || true

  # ── Deploy to Azure (main branch only) ───────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push to ACR
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/maas-platform:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/maas-platform:${{ github.sha }}

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: maas-platform
          image: ${{ secrets.ACR_LOGIN_SERVER }}/maas-platform:${{ github.sha }}
          cpu: 2
          memory: 4
          ports: 8000
          environment-variables: |
            APP_ENV=production
            APP_WORKERS=4
